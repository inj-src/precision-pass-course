  <!--
    CUSTOMIZE PER COURSE — change only the three accent variables below.
    Options:
      vermillion  #D94F30 / #C4432A / #FDEEE9 / #E8836C  (default)
      coral       #E06B56 / #C85A47 / #FDECEA / #E89585
      teal        #2A7B9B / #1F6280 / #E4F2F7 / #5A9DB8
      amber       #D4A843 / #BF9530 / #FDF5E0 / #E0C070
      forest      #2D8B55 / #226B41 / #E8F5EE / #5AAD7A
  -->
  <style>
    :root {
      --color-accent:       #2D8B55;
      --color-accent-hover: #226B41;
      --color-accent-light: #E8F5EE;
      --color-accent-muted: #5AAD7A;
    }
    .translation-code .hljs {
      background: transparent;
      padding: 0;
    }
    .translation-block {
      grid-template-columns: 1fr;
    }
    .translation-english {
      border-left: 0;
      border-top: 3px solid var(--color-accent);
    }
    .course-switcher {
      max-width: var(--content-width-wide);
      margin: var(--space-12) auto var(--space-16);
      padding: var(--space-6);
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 3fr);
      gap: var(--space-4);
      align-items: stretch;
    }
    .course-switch-link {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 96px;
      padding: var(--space-5);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      color: var(--color-text);
      text-decoration: none;
      box-shadow: var(--shadow-sm);
      transition: transform var(--duration-fast) var(--ease-out), border-color var(--duration-fast), box-shadow var(--duration-fast);
    }
    .course-switch-link:hover {
      transform: translateY(-2px);
      border-color: var(--color-accent-muted);
      box-shadow: var(--shadow-md);
    }
    .course-switch-link.next { text-align: right; }
    .course-switch-kicker {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-2);
    }
    .course-switch-title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 700;
      line-height: var(--leading-snug);
    }
    @media (max-width: 768px) {
      .course-switcher { grid-template-columns: 1fr; }
      .course-switch-link.next { text-align: left; }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js" defer></script>
